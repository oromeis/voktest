services:
  voktest:
    build:
      context: /volume2/Docker/voktest
      dockerfile: Dockerfile
    container_name: voktest
    restart: unless-stopped
    environment:
      TZ: Europe/Berlin
      HOST: 0.0.0.0
      PORT: 5173
    ports:
      - "5173:5173"
    volumes:
      - /volume2/Docker/voktest/server-data:/app/server-data
      - /volume2/Docker/voktest/.git:/app/.git:ro
